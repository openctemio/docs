<?xml version="1.0" encoding="UTF-8"?>
<!--
  OpenCTEM — App icon (letterform direction)
  C-mark on deep ink rounded square. Use for favicon, PWA, dock, social.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96"
     role="img" aria-label="OpenCTEM">
  <!-- Background -->
  <rect width="96" height="96" rx="22" fill="#0A1628"/>

  <!--
    C-mark, single smooth arc, white-on-dark. Marker dot uses bright teal
    (#14B8A6) so it pops against the dark background.
  -->
  <g transform="translate(8 8) scale(0.667)" fill="none" stroke="#FAFAF9"
     stroke-width="16" stroke-linecap="butt">
    <path d="M 92.22 39.86 A 38 38 0 1 0 92.22 80.14"/>
    <circle cx="98" cy="60" r="7" fill="#14B8A6" stroke="none"/>
  </g>
</svg>
